<div class="container w-full max-w-7xl mx-auto p-4">
  <h1 class="text-2xl mb-8 text-center font-bold">Gerenciador de Vinhos</h1>
  
  <app-wine-create-form 
    [tipos]="tipos" 
    (vinhoSalvo)="onVinhoSalvo($event)">
  </app-wine-create-form>

  <app-wine-table 
    [vinhos]="vinhos()" 
    (editar)="onEditar($event)"
    (deletar)="onDeletar($event)">
  </app-wine-table>

  <app-wine-modal-edit 
    [tipos]="tipos"
    [vinhoEmEdicao]="vinhoEmEdicao()"
    [(visible)]="modalVisible"
    (vinhoAtualizado)="onVinhoAtualizado($event)">
  </app-wine-modal-edit>

  <p-toast />
</div>
