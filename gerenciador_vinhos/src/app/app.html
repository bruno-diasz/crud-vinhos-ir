<p-toolbar class="mb-6">
  <ng-template #start>
    <h1 class="text-xl font-bold m-0">Gerenciador de Vinhos</h1>
  </ng-template>
  <ng-template #end>
    @if (authService.isAuthenticated()) {
      <span class="mr-3 text-sm">Bem-vindo, {{ authService.usuario() }}</span>
      <p-button label="Listagem" icon="pi pi-list" routerLink="/vinhos" severity="secondary" class="mr-2" />
      <p-button label="Novo Vinho" icon="pi pi-plus" routerLink="/vinhos/novo" severity="secondary" class="mr-2" />
      <p-button label="Sair" icon="pi pi-sign-out" (onClick)="authService.logout()" />
    } @else {
      <p-button label="Entrar" icon="pi pi-sign-in" routerLink="/login" />
    }
  </ng-template>
</p-toolbar>

<div class="container w-full max-w-7xl mx-auto p-4">
  <router-outlet />
  <p-toast />
</div>
