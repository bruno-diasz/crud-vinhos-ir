<div class="container w-full max-w-7xl mx-auto p-4">
  <h1 class="text-2xl mb-8 text-center font-bold">Gerenciador de Vinhos</h1>
  <p-fieldset legend="Novo Vinho">
    <div class="card grid grid-cols-1 md:grid-cols-2 gap-4">
      <p-inputgroup>
        <p-inputgroup-addon>
          🍷
        </p-inputgroup-addon>
        <input pInputText [(ngModel)]="nome" placeholder="Nome" />
      </p-inputgroup>
      <p-inputgroup>
        <p-inputgroup-addon>R$</p-inputgroup-addon>
        <p-inputnumber [(ngModel)]="preco" placeholder="Preço" mode="decimal" [minFractionDigits]="2"
          [maxFractionDigits]="2" [showClear]="true" />
      </p-inputgroup>
      <p-inputgroup>
        <p-inputgroup-addon>
          <i class="pi pi-tags"></i>
        </p-inputgroup-addon>
        <p-select [(ngModel)]="tipoSelected" [options]="tipos" placeholder="Tipo" />
      </p-inputgroup>
      <p-inputgroup>
        <p-inputgroup-addon>
          <i class="pi pi-box"></i>
        </p-inputgroup-addon>
        <p-togglebutton [(ngModel)]="disponivel" onLabel="Disponível" offLabel="Indisponível" />
      </p-inputgroup>

      <p-button class="mt-8" label="Salvar" icon="pi pi-check" (onClick)="save()" />
    </div>

  </p-fieldset>

  <div class="card mt-20">
    <p-table [value]="vinhos" [tableStyle]="{ 'min-width': '50rem' }">
      <ng-template #header>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Preço</th>
          <th>Tipo</th>
          <th>Disponibilidade</th>
          <th>Ações</th>
        </tr>
      </ng-template>
      <ng-template #body let-vinho>
        <tr>
          <td>{{ vinho.id }}</td>
          <td>{{ vinho.nome }}</td>
          <td>{{ vinho.preco | number:'1.2-2' }}</td>
          <td>{{ vinho.tipo }}</td>
          <td>
            @if( vinho.disponivel ){
              Disponível
            }@else {
              Indisponível
            }
          </td>
          <td class="space-x-1.5">
            <p-button icon="pi pi-pencil" severity="info" (click)="showUpdateDialog(vinho)"></p-button>
            <p-button icon="pi pi-trash" severity="danger" (click)="showDeleteDialog($event, vinho)"></p-button>
          </td>
        </tr>
      </ng-template>
    </p-table>
    <p-toast />
    <p-confirmdialog />
    <p-dialog header="Editar Vinho" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }">
      <p-inputgroup class="mb-4">
        <p-inputgroup-addon>
          🍷
        </p-inputgroup-addon>
        <input pInputText [(ngModel)]="nome" placeholder="Nome" />
      </p-inputgroup>
      <p-inputgroup class="mb-4">
        <p-inputgroup-addon>R$</p-inputgroup-addon>
        <p-inputnumber [(ngModel)]="preco" placeholder="Preço" mode="decimal" [minFractionDigits]="2"
          [maxFractionDigits]="2" [showClear]="true" />
      </p-inputgroup>
      <p-inputgroup class="mb-4">
        <p-inputgroup-addon>
          <i class="pi pi-tags"></i>
        </p-inputgroup-addon>
        <p-select [(ngModel)]="tipoSelected" [options]="tipos" placeholder="Tipo" />
      </p-inputgroup>
      <p-inputgroup class="mb-8">
        <p-inputgroup-addon>
          <i class="pi pi-box"></i>
        </p-inputgroup-addon>
        <p-togglebutton [(ngModel)]="disponivel" onLabel="Disponível" offLabel="Indisponível" />
      </p-inputgroup>

      <div class="flex justify-end gap-2">
        <p-button label="Cancelar" severity="secondary" (click)="cleanForm() ; visible = false" />
        <p-button label="Salvar" (click)="update(); visible = false" />
      </div>
    </p-dialog>
  </div>
</div>
