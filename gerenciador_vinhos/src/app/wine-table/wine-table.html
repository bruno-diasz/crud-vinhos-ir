  <div class="card mt-20">
    <p-table [value]="vinhos" [tableStyle]="{ 'min-width': '50rem' }">
      <ng-template #header>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Preço</th>
          <th>Tipo</th>
          <th>Disponibilidade</th>
          <th>Ações</th>
        </tr>
      </ng-template>
      <ng-template #body let-vinho>
        <tr>
          <td>{{ vinho.id }}</td>
          <td>{{ vinho.nome }}</td>
          <td>{{ vinho.preco | number:'1.2-2' }}</td>
          <td>{{ vinho.tipo }}</td>
          <td>
            @if( vinho.disponivel ){
              Disponível
            }@else {
              Indisponível
            }
          </td>
          <td class="space-x-1.5">
            <p-button icon="pi pi-pencil" severity="info" (click)="showUpdateDialog(vinho)"></p-button>
            <p-button icon="pi pi-trash" severity="danger" (click)="showDeleteDialog($event, vinho)"></p-button>
          </td>
        </tr>
      </ng-template>
    </p-table>
    <p-toast />
    <p-confirmdialog />
    
 
  </div>
